<div class="confirm-wrapper">
  <div class="confirm-container">
    <div class="topography-header"></div>

    <div class="content">
      <div class="back-nav">
        <span class="back-arrow">←</span>
      </div>

      <h2>Confirma el código</h2>
      <p class="description">
        Te hemos enviado un código a tu correo, por favor ingresalo para confirmar tu identidad
      </p>

      <div class="code-inputs">
        <input type="text" maxlength="1" placeholder="">
        <input type="text" maxlength="1" placeholder="">
        <input type="text" maxlength="1" placeholder="">
        <input type="text" maxlength="1" placeholder="">
        <input type="text" maxlength="1" placeholder="">
        <input type="text" maxlength="1" placeholder="">
      </div>

      <p class="resend-text">
        Si no has recibido el código aún, haz <a (click)="onResend()">click aquí.</a>
      </p>

      <button class="btn-enviar" (click)="onConfirm()">Enviar</button>
    </div>

    <div class="topography-footer">
      <div class="logo-container">
         <img src="/logo.png" alt="Cucxplorer">
      </div>
    </div>
  </div>

  <div class="overlay-success" *ngIf="isSuccessful">
    <div class="modal-card fade-in">
      <div class="check-icon">✔</div>
      <h3>Cuenta Registrada</h3>
      <p>Te redireccionaremos a la pantalla de inicio de sesión en breve</p>
    </div>
  </div>
</div>
