<div class="login-wrapper">
  <div class="main-container" [class.right-panel-active]="isForgotMode">
    
    <div class="form-container">
      <form *ngIf="isForgotMode" class="form-content fade-in">
        <div class="logo-form"><img src="/cucXplorer_horizontal.png" alt="Logo"></div>
        <h2>Recuperar Contraseña</h2>
        <p style="margin-bottom: 20px; color: #666;">Introduce tu correo para enviarte las instrucciones.</p>
        <div class="input-group">
          <input type="email" placeholder="Correo Electrónico">
        </div>
        <button type="submit">Enviar Enlace</button>
      </form>

      <form *ngIf="!isForgotMode" class="form-content fade-in">
        <div class="logo-form"><img src="/cucXplorer_horizontal.png" alt="Logo"></div>
        <h2>Iniciar Sesión</h2>
        <div class="input-group">
          <input type="email" placeholder="Correo">
        </div>
        <div class="input-group">
          <input type="password" placeholder="Contraseña">
        </div>
        <button type="submit">Entrar</button>
      </form>
    </div>

    <div class="overlay-container">
      <div class="overlay">
        <div class="overlay-panel">
          
          <ng-container *ngIf="!isForgotMode">
            <h2>¿Problemas de acceso?</h2>
            <p>Si olvidaste tu contraseña o no puedes entrar, nosotros te ayudamos.</p>
            <button class="ghost" (click)="toggleMode()">Olvidé mi contraseña</button>
          </ng-container>

          <ng-container *ngIf="isForgotMode">
            <h2>¿La recordaste?</h2>
            <p>Si ya recordaste tus credenciales, vuelve al inicio de sesión aquí.</p>
            <button class="ghost" (click)="toggleMode()">Volver al Login</button>
          </ng-container>

        </div>
      </div>
    </div>

  </div>
</div>
